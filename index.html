<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>USEQIV - The Complete Platform for Contest Voting, Event Ticketing & Crowdfunding Success</title>
    <meta name="description" content="USEQIV is the ultimate platform for hosting voting contests, selling event tickets, crowdfunding campaigns, and custom forms. Secure payments, real-time analytics, and seamless management." />
    <meta name="author" content="USEQIV" />
    <meta name="keywords" content="voting platform, event tickets, contests, pageants, awards, competitions, ticket sales, QR tickets, live voting, crowdfunding, fundraising, event management, contest voting platform, online voting system" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large" />
    <meta name="bingbot" content="index, follow" />
    <link rel="canonical" href="https://www.useqiv.com" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="USEQIV" />
    <meta name="application-name" content="USEQIV" />

    <!-- Social preview tags are generated dynamically by the OG edge endpoint.
         Keep app shell free of static og:image/twitter:image to avoid incorrect fallback previews. -->

    <!-- Theme Color -->
    <meta name="theme-color" content="#ea580c" />
    <meta name="msapplication-TileColor" content="#ea580c" />
    <meta name="msapplication-TileImage" content="/pwa-192x192.png" />

    <!-- Additional SEO -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="geo.region" content="NG" />
    <meta name="geo.placename" content="Nigeria" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="1 days" />
    <meta name="rating" content="general" />
    <meta name="distribution" content="global" />

    <!-- Structured Data - Organization & WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.useqiv.com/#organization",
          "name": "USEQIV",
          "url": "https://www.useqiv.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.useqiv.com/logo.png",
            "width": 512,
            "height": 512
          },
          "description": "USEQIV is the ultimate platform for hosting voting contests, selling event tickets, crowdfunding campaigns, and custom forms.",
          "foundingDate": "2024",
          "sameAs": [
            "https://twitter.com/useqiv",
            "https://facebook.com/useqiv",
            "https://instagram.com/useqiv",
            "https://linkedin.com/company/useqiv"
          ],
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer service",
            "email": "support@useqiv.com",
            "availableLanguage": ["English"]
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://www.useqiv.com/#website",
          "name": "USEQIV",
          "url": "https://www.useqiv.com",
          "description": "The Complete Platform for Contest Voting, Event Ticketing & Crowdfunding Success",
          "publisher": {
            "@id": "https://www.useqiv.com/#organization"
          },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.useqiv.com/search?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          },
          "inLanguage": "en-US"
        },
        {
          "@type": "SoftwareApplication",
          "name": "USEQIV",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.8",
            "ratingCount": "1250",
            "bestRating": "5",
            "worstRating": "1"
          },
          "description": "USEQIV is a comprehensive platform for contest voting, event ticketing, crowdfunding, and custom forms.",
          "url": "https://www.useqiv.com",
          "image": "https://www.useqiv.com/logo.png"
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
